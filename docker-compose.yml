version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: fwf_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fwf_wordpress_db}
      MYSQL_USER: ${MYSQL_USER:-fwf_wordpress_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-FwfPassword2026}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wordpress_network

  wordpress:
    image: sovanra/fwf-wordpress-website:lastest
    container_name: fwf_wordpress
    restart: always
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-fwf_wordpress_db}
      WORDPRESS_DB_USER: ${MYSQL_USER:-fwf_wordpress_user}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-FwfPassword2026}
    volumes:
      - ./wp-content:/var/www/html/wp-content
      - ./wp-config.php:/var/www/html/wp-config.php
    ports:
      - "8080:80"
    networks:
      - wordpress_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: fwf_phpmyadmin
    restart: always
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8081:80"
    networks:
      - wordpress_network

volumes:
  db_data:

networks:
  wordpress_network:
    driver: bridge